<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>台股掃描器</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg:        #0a0e1a;
    --surface:   #111827;
    --card:      #1a2235;
    --border:    #243047;
    --accent:    #00d4ff;
    --bull:      #ff4d6d;
    --bear:      #00e676;
    --gold:      #ffd700;
    --warn:      #ffb300;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, #0a0e1a 80%, transparent);
    padding: 16px 16px 8px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo {
    font-size: 18px; font-weight: 700; letter-spacing: 1px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,.4);
  }
  .logo span { color: var(--bull); }
  #last-scan { font-size: 11px; color: var(--muted); }

  /* ── Controls ── */
  .controls {
    padding: 12px 16px;
    display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  }
  .toggle-group { display: flex; gap: 8px; }
  .toggle-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); color: var(--muted); font-size: 13px;
    cursor: pointer; transition: all .2s; font-family: inherit;
  }
  .toggle-btn.active {
    border-color: var(--accent); color: var(--accent);
    background: rgba(0,212,255,.08);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .toggle-btn.active .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  .scan-btn {
    margin-left: auto;
    padding: 10px 24px; border-radius: 24px; border: none;
    background: linear-gradient(135deg, #00d4ff, #0090c8);
    color: #000; font-weight: 700; font-size: 14px;
    cursor: pointer; transition: all .2s; font-family: inherit;
    white-space: nowrap;
  }
  .scan-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,255,.4); }
  .scan-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

  /* ── Progress ── */
  #progress-wrap {
    padding: 0 16px 12px; display: none;
  }
  .progress-bar-bg {
    height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #0090c8);
    border-radius: 2px; transition: width .3s; width: 0%;
  }
  .progress-label { font-size: 11px; color: var(--muted); margin-top: 5px; }

  /* ── Stats strip ── */
  .stats-strip {
    display: flex; gap: 0; padding: 0 16px 14px;
  }
  .stat-box {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    padding: 10px 12px; text-align: center;
  }
  .stat-box:first-child { border-radius: var(--radius) 0 0 var(--radius); }
  .stat-box:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
  .stat-box + .stat-box { border-left: none; }
  .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 600; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Results table ── */
  #results-section { padding: 0 16px 80px; }
  .section-title {
    font-size: 13px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* Card per result */
  .result-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 10px;
    position: relative; overflow: hidden;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }

  .result-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px; background: var(--accent);
  }
  .result-card.has-golden::before { background: var(--gold); }
  .result-card.has-gap::before    { background: var(--bull); }
  .result-card.has-both::before   {
    background: linear-gradient(180deg, var(--gold) 50%, var(--bull) 50%);
  }

  .card-top {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 10px;
  }
  .symbol {
    font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600;
    color: #fff;
  }
  .price-wrap { text-align: right; }
  .price {
    font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 600;
  }
  .change {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    margin-top: 1px;
  }
  .bull { color: var(--bull); }
  .bear { color: var(--bear); }

  .card-mid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 8px;
    margin-bottom: 10px;
  }
  .info-cell { }
  .info-lbl { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .info-val {
    font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text);
  }
  .info-val.bull { color: var(--bull); }
  .info-val.bear { color: var(--bear); }
  .info-val.gold { color: var(--gold); }
  .info-val.warn { color: var(--warn); }

  .card-signals { display: flex; gap: 6px; flex-wrap: wrap; }
  .signal-tag {
    padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 500;
  }
  .tag-golden { background: rgba(255,215,0,.15); color: var(--gold); border: 1px solid rgba(255,215,0,.3); }
  .tag-near   { background: rgba(255,179,0,.12); color: var(--warn); border: 1px solid rgba(255,179,0,.3); }
  .tag-gap    { background: rgba(255,77,109,.12); color: var(--bull); border: 1px solid rgba(255,77,109,.3); }

  /* ── Empty / scanning state ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-msg  { font-size: 15px; }
  .empty-sub  { font-size: 13px; margin-top: 6px; }

  /* ── Scanning animation ── */
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
  .scanning-indicator {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); margin-right: 6px;
    animation: pulse 1s infinite;
  }
</style>
</head>
<body>

<header>
  <div class="logo">台股掃描<span>-告訴我你會買日月光</span></div>
  <div id="last-scan">尚未掃描</div>
</header>

<div class="controls">
  <div class="toggle-group">
    <button class="toggle-btn active" id="btn-kd" onclick="toggleOpt('kd')">
      <span class="dot"></span>KD訊號
    </button>
    <button class="toggle-btn active" id="btn-gap" onclick="toggleOpt('gap')">
      <span class="dot"></span>跳空
    </button>
  </div>
  <button class="scan-btn" id="scan-btn" onclick="startScan()">開始掃描</button>
</div>

<div id="progress-wrap">
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="progress-label" id="progress-label">準備中…</div>
</div>

<div class="stats-strip">
  <div class="stat-box">
    <div class="stat-val" id="stat-hits">—</div>
    <div class="stat-lbl">命中</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-golden">—</div>
    <div class="stat-lbl">黃金交叉</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-gap">—</div>
    <div class="stat-lbl">跳空</div>
  </div>
  <div class="stat-box">
    <div class="stat-val" id="stat-bull">—</div>
    <div class="stat-lbl">多頭排列</div>
  </div>
</div>

<div id="results-section">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">📊</div>
    <div class="empty-msg">點擊「開始掃描」</div>
    <div class="empty-sub">將掃描全部台股清單</div>
  </div>
  <div id="cards-container"></div>
</div>

<script>
const opts = { kd: true, gap: true };
let pollTimer = null;
let currentTaskId = null; // 🌟 新增：用來記錄當前正在跑的任務 ID

function toggleOpt(type) {
  opts[type] = !opts[type];
  document.getElementById(`btn-${type}`).classList.toggle('active', opts[type]);
}

// 1. 發送請求給後端，並取得專屬的 task_id
function startScan() {
  const scanBtn = document.getElementById("scan-btn");
  scanBtn.disabled = true; // 避免毫秒內的極速重複點擊，稍後在輪詢中會解鎖

  // 顯示進度條
  document.getElementById("progress-wrap").style.display = "block";
  document.getElementById("progress-label").innerText = "正在向伺服器申請掃描任務...";
  document.getElementById("progress-fill").style.width = "0%";

  fetch("/api/scan/start", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ enable_kd: opts.kd, enable_gap: opts.gap })
  })
  .then(res => res.json())
  .then(data => {
    if (data.ok) {
      // 🌟 核心：拿到這一次點擊專屬的全新 Task ID！各走各的路
      currentTaskId = data.task_id; 
      
      // 清除上一次的定時器，改追蹤這一次的新進度
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(pollProgress, 1000);
      pollProgress(); // 立刻執行一次
    } else {
      alert(data.msg || "啟動失敗");
      scanBtn.disabled = false;
    }
  })
  .catch(err => {
    console.error(err);
    alert("連線後端出錯");
    scanBtn.disabled = false;
  });
}

// 2. 定時輪詢進度（🌟 網址加上了 ?task_id=... 參數）
function pollProgress() {
  if (!currentTaskId) return;

  fetch(`/api/scan/status?task_id=${currentTaskId}`)
  .then(res => res.json())
  .then(data => {
    const scanBtn = document.getElementById("scan-btn");
    
    if (data.status === "scanning") {
      // 🌟 即使在掃描中，我們也把按鈕恢復（允許使用者隨時再按一次，啟動另一個新任務）
      scanBtn.disabled = false; 
      scanBtn.innerText = "再次全新掃描";

      // 更新進度條
      const pct = data.total > 0 ? Math.round((data.progress / data.total) * 100) : 0;
      document.getElementById("progress-fill").style.width = `${pct}%`;
      document.getElementById("progress-label").innerHTML = 
        `<span class="scanning-indicator"></span>正在掃描 (${data.progress}/${data.total}) - 當前: ${data.current_symbol}`;
    } 
    else if (data.status === "done") {
      clearInterval(pollTimer);
      scanBtn.disabled = false;
      scanBtn.innerText = "開始掃描";
      document.getElementById("progress-label").innerText = "掃描完成！";
      document.getElementById("progress-fill").style.width = "100%";
      if (data.last_scan) {
        document.getElementById("last-scan").innerText = `最後掃描時間: ${data.last_scan}`;
      }
      // 抓取最終結果
      fetchResults();
    }
  })
  .catch(err => console.error("輪詢狀態出錯:", err));
}

// 3. 取得這一個任務的最終股票結果（🌟 網址加上了 ?task_id=... 參數）
function fetchResults() {
  if (!currentTaskId) return;

  fetch(`/api/scan/results?task_id=${currentTaskId}`)
  .then(res => res.json())
  .then(data => {
    renderCards(data.results || []);
  })
  .catch(err => console.error("取得結果出錯:", err));
}

// 4. 渲染卡片與數據統計
function renderCards(results) {
  const container = document.getElementById("cards-container");
  const emptyState = document.getElementById("empty-state");
  
  // 統計變數
  let goldenCount = 0;
  let gapCount = 0;
  let bullCount = 0;

  container.innerHTML = "";

  if (results.length === 0) {
    emptyState.style.display = "block";
    document.getElementById("stat-hits").innerText = "0";
    document.getElementById("stat-golden").innerText = "0";
    document.getElementById("stat-gap").innerText = "0";
    document.getElementById("stat-bull").innerText = "0";
    return;
  }

  emptyState.style.display = "none";

  results.forEach(item => {
    // 統計計算
    if (item["KD訊號"] && item["KD訊號"].includes("黃金交叉")) goldenCount++;
    if (item["跳空訊號"] === "跳空") gapCount++;
    if (item["MA排列"] === "多頭") bullCount++;

    // 判斷左側邊框顏色樣式
    let borderClass = "";
    const hasKD = !!item["KD訊號"];
    const hasGap = item["跳空訊號"] === "跳空";
    if (hasKD && hasGap) borderClass = "has-both";
    else if (hasKD) borderClass = "has-golden";
    else if (hasGap) borderClass = "has-gap";

    const changeClass = item["漲跌%"] >= 0 ? "bull" : "bear";
    const changeSign = item["漲跌%"] >= 0 ? "+" : "";

    const card = document.createElement("div");
    card.className = `result-card ${borderClass}`;
    card.innerHTML = `
      <div class="card-top">
        <div class="symbol">${item["代碼"]}</div>
        <div class="price-wrap">
          <div class="price ${changeClass}">${item["價格"]}</div>
          <div class="change ${changeClass}">${changeSign}${item["漲跌%"]}%</div>
        </div>
      </div>
      <div class="card-mid">
        <div class="info-cell">
          <div class="info-lbl">MA 位置</div>
          <div class="info-val">${item["MA位置"]}</div>
        </div>
        <div class="info-cell">
          <div class="info-lbl">MA 排列</div>
          <div class="info-val ${item["MA排列"] === '多頭' ? 'bull' : item["MA排列"] === '空頭' ? 'bear' : ''}">${item["MA排列"]}</div>
        </div>
        <div class="info-cell">
          <div class="info-lbl">K 值</div>
          <div class="info-val">${item["K值"]}</div>
        </div>
        <div class="info-cell">
          <div class="info-lbl">D 值</div>
          <div class="info-val">${item["D值"]}</div>
        </div>
      </div>
      <div class="card-signals">
        ${item["KD訊號"] === "黃金交叉" ? '<span class="signal-tag tag-golden">👑 黃金交叉</span>' : ''}
        ${item["KD訊號"] === "即將黃金交叉" ? '<span class="signal-tag tag-near">⏳ 即將黃金交叉</span>' : ''}
        ${item["跳空訊號"] === "跳空" ? '<span class="signal-tag tag-gap">🚀 跳空缺口</span>' : ''}
      </div>
    `;
    container.appendChild(card);
  });

  // 更新統計看板
  document.getElementById("stat-hits").innerText = results.length;
  document.getElementById("stat-golden").innerText = goldenCount;
  document.getElementById("stat-gap").innerText = gapCount;
  document.getElementById("stat-bull").innerText = bullCount;
}
</script>
</body>
</html>
